services:
  - type: web
    name: tw-news-radar
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Taipei
