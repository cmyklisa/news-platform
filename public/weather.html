<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>天氣 · 台灣即時氣象</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="weather">
  <header class="topbar">
    <a class="back-link" href="/">
      <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M15.5 4l-8 8 8 8 1.5-1.5L10.5 12l6.5-6.5z"/></svg>
      <span>回首頁</span>
    </a>
    <h1 class="topbar-title">即時氣象</h1>
    <span id="status" class="status"></span>
  </header>

  <main class="weather-main wx-layout">
    <section class="wx-hero">
      <div class="wx-map-wrap">
        <div class="wx-map-hint">👆 點任一縣市看詳情</div>
        <svg id="twMap" class="tw-map" viewBox="0 0 240 400" xmlns="http://www.w3.org/2000/svg">
          <!-- 較細緻的台灣輪廓（簡化但形狀更接近真實） -->
          <defs>
            <linearGradient id="islandGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(50,68,86,0.6)"/>
              <stop offset="100%" stop-color="rgba(30,40,52,0.7)"/>
            </linearGradient>
          </defs>
          <path d="M 138 28
                   L 152 38 L 162 56 L 169 75 L 174 96
                   L 178 122 L 180 150 L 178 178 L 174 206
                   L 168 232 L 158 256 L 144 280 L 128 302
                   L 113 320 L 100 332 L 90 332
                   L 82 320 L 76 304 L 68 282 L 60 256
                   L 54 232 L 50 206 L 48 178 L 50 150
                   L 54 122 L 62 96 L 72 75 L 84 56
                   L 100 40 L 118 30 Z"
                fill="url(#islandGrad)"
                stroke="#5a6a82" stroke-width="1.4" stroke-linejoin="round" />
          <!-- 中央山脈 -->
          <path d="M 122 60 Q 132 110 130 160 Q 126 220 118 268 Q 110 304 100 320"
                fill="none" stroke="rgba(150,190,160,0.32)" stroke-width="2.5"
                stroke-dasharray="3 5" stroke-linecap="round" />
          <!-- 離島標記區（左下） -->
          <text x="20" y="170" font-size="6" fill="rgba(255,255,255,0.25)"
                font-family="serif" letter-spacing="2">離島</text>
          <g id="mapCities"></g>
        </svg>
        <div class="wx-legend">
          <span class="lg lg-sunny">☀️ 晴</span>
          <span class="lg lg-cloudy">⛅ 多雲</span>
          <span class="lg lg-overcast">☁️ 陰</span>
          <span class="lg lg-rain">🌧️ 雨</span>
          <span class="lg lg-storm">⛈️ 雷雨</span>
          <span class="lg lg-typhoon">🌀 颱風</span>
        </div>
      </div>

      <div class="wx-summary" id="wxSummary">
        <div class="wx-loading">取得即時氣象中…</div>
      </div>
    </section>

    <section class="wx-alerts">
      <h2 class="wx-alerts-title">⚠️ 颱風 / 地震 / 豪雨等重大警示</h2>
      <div class="wx-alerts-grid" id="wxAlerts">
        <div class="empty">載入中…</div>
      </div>
    </section>
  </main>

  <script src="/biasWords.js"></script>
  <script src="/favorites-store.js"></script>
  <script src="/drawer.js"></script>
  <script src="/weather.js"></script>
</body>
</html>
