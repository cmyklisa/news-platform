<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>我的每日情報</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="fav">
  <header class="topbar">
    <a class="back-link" href="/">
      <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M15.5 4l-8 8 8 8 1.5-1.5L10.5 12l6.5-6.5z"/></svg>
      <span>回首頁</span>
    </a>
    <div class="paper-search">
      <input id="paperSearch" type="search" placeholder="🔍 搜尋今日所有標題…" autocomplete="off" />
      <div id="paperSearchResults" class="paper-search-results" hidden></div>
    </div>
    <span id="status" class="status"></span>
  </header>

  <section class="newspaper" id="newspaper">
    <header class="masthead">
      <div class="masthead-top">
        <span class="meta-l">第 <span id="issueNum">—</span> 期</span>
        <span class="meta-c">親自精選 · 一報在手</span>
        <span class="meta-r">售價 <span id="price">NT$ 30</span></span>
      </div>
      <div class="masthead-rule double"></div>
      <h1 class="masthead-title" id="paperTitleH1"
          contenteditable="true" spellcheck="false"
          title="點擊可編輯報名">我的每日情報</h1>
      <div class="masthead-sub">THE DAILY YOU &nbsp;·&nbsp; A NEWSPAPER OF ONE</div>
      <div class="masthead-rule"></div>
      <div class="masthead-bottom">
        <span id="paperDate"></span>
        <span class="dot-sep">·</span>
        <span id="paperCount">0 則剪報</span>
        <span class="dot-sep">·</span>
        <span>編輯人 / 我</span>
      </div>
      <div class="masthead-rule"></div>
    </header>
    <div id="clippings" class="clippings"></div>

    <!-- 動態主播人偶 -->
    <div class="anchor-mascot" aria-hidden="true" title="今日主播">
      <svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
        <!-- 背景棚台 -->
        <rect x="6" y="118" width="108" height="38" fill="#2b2620" rx="3" />
        <rect x="6" y="118" width="108" height="6" fill="#1a1612" rx="2" />
        <text x="60" y="142" text-anchor="middle" font-family="Georgia, serif"
              font-size="9" font-weight="700" fill="#d4b27a" letter-spacing="2">DAILY YOU</text>
        <text x="60" y="153" text-anchor="middle" font-family="Georgia, serif"
              font-size="6" fill="#8a7860" letter-spacing="1">BREAKING NEWS</text>

        <!-- 主播身體（西裝 + 領帶） -->
        <g class="anchor-body">
          <!-- 西裝外套 -->
          <path d="M 30 110 L 50 95 L 70 95 L 90 110 L 90 130 L 30 130 Z" fill="#2b2620" />
          <!-- 襯衫 -->
          <polygon points="50,95 60,118 70,95 65,95 60,108 55,95" fill="#f0ebe0" />
          <!-- 領帶 -->
          <polygon points="58,98 62,98 64,108 60,124 56,108" fill="#b04a2f" />
          <polygon points="56,108 64,108 60,113" fill="#7a2f1c" />
        </g>

        <!-- 主播頭 -->
        <g class="anchor-head">
          <!-- 頸 -->
          <rect x="55" y="85" width="10" height="14" fill="#d4a87a" />
          <!-- 臉 -->
          <ellipse cx="60" cy="60" rx="20" ry="24" fill="#e6c19a" />
          <!-- 頭髮 -->
          <path d="M 40 56 Q 40 32 60 32 Q 80 32 80 56 L 80 48 Q 70 38 60 40 Q 50 42 40 48 Z"
                fill="#3a2820" />
          <!-- 鬢角 -->
          <path d="M 40 56 L 40 68 L 44 64 Z" fill="#3a2820" />
          <path d="M 80 56 L 80 68 L 76 64 Z" fill="#3a2820" />

          <!-- 眉 -->
          <rect x="49" y="55" width="7" height="2" fill="#2a1d15" rx="1" />
          <rect x="64" y="55" width="7" height="2" fill="#2a1d15" rx="1" />

          <!-- 眼睛（會眨） -->
          <g class="anchor-eyes">
            <ellipse cx="52" cy="62" rx="2.6" ry="2.4" fill="#1a1612" />
            <ellipse cx="68" cy="62" rx="2.6" ry="2.4" fill="#1a1612" />
            <!-- 高光 -->
            <circle cx="53" cy="61" r="0.7" fill="#fff" />
            <circle cx="69" cy="61" r="0.7" fill="#fff" />
          </g>

          <!-- 鼻 -->
          <path d="M 60 64 L 58 70 L 62 70 Z" fill="#c89876" opacity="0.4" />

          <!-- 嘴（會說話） -->
          <ellipse class="anchor-mouth" cx="60" cy="75" rx="4" ry="1.5" fill="#7a2f1c" />
        </g>

        <!-- 手 / 紙稿 -->
        <g class="anchor-hands">
          <rect x="34" y="124" width="52" height="14" fill="#f4ecd8" stroke="#5a4f40" stroke-width="0.8" rx="1" />
          <line x1="38" y1="128" x2="82" y2="128" stroke="#8a7860" stroke-width="0.5" />
          <line x1="38" y1="131" x2="78" y2="131" stroke="#8a7860" stroke-width="0.5" />
          <line x1="38" y1="134" x2="80" y2="134" stroke="#8a7860" stroke-width="0.5" />
        </g>

        <!-- LIVE 燈 -->
        <g class="anchor-live">
          <circle cx="100" cy="20" r="5" fill="#ff3030" />
          <text x="100" y="35" text-anchor="middle" font-family="Georgia, serif"
                font-size="6" font-weight="700" fill="#ff3030" letter-spacing="1">LIVE</text>
        </g>
      </svg>
    </div>
  </section>

  <script src="/biasWords.js"></script>
  <script src="/favorites-store.js"></script>
  <script src="/drawer.js"></script>
  <script src="/favorites.js"></script>
</body>
</html>
