<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>我的每日情報</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="fav">
  <header class="topbar">
    <a class="back-link" href="/">
      <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M15.5 4l-8 8 8 8 1.5-1.5L10.5 12l6.5-6.5z"/></svg>
      <span>回首頁</span>
    </a>
    <div class="paper-search">
      <input id="paperSearch" type="search" placeholder="🔍 搜尋今日所有標題…" autocomplete="off" />
      <div id="paperSearchResults" class="paper-search-results" hidden></div>
    </div>
    <span id="status" class="status"></span>
  </header>

  <section class="newspaper" id="newspaper">
    <header class="masthead">
      <div class="masthead-top">
        <span class="meta-l">第 <span id="issueNum">—</span> 期</span>
        <span class="meta-c">親自精選 · 一報在手</span>
        <span class="meta-r">售價 <span id="price">NT$ 30</span></span>
      </div>
      <div class="masthead-rule double"></div>
      <h1 class="masthead-title" id="paperTitleH1"
          contenteditable="true" spellcheck="false"
          title="點擊可編輯報名">我的每日情報</h1>
      <div class="masthead-sub">THE DAILY YOU &nbsp;·&nbsp; A NEWSPAPER OF ONE</div>
      <div class="masthead-rule"></div>
      <div class="masthead-bottom">
        <span id="paperDate"></span>
        <span class="dot-sep">·</span>
        <span id="paperCount">0 則剪報</span>
        <span class="dot-sep">·</span>
        <span>編輯人 / 我</span>
      </div>
      <div class="masthead-rule"></div>
    </header>
    <div id="clippings" class="clippings"></div>

    <!-- 動態主播人偶（chibi 可愛版） -->
    <div class="anchor-bubble" id="anchorBubble" aria-hidden="true"></div>
    <div class="anchor-mascot" aria-hidden="true" title="今日主播">
      <svg viewBox="0 0 130 170" xmlns="http://www.w3.org/2000/svg">
        <!-- 背景棚台 -->
        <rect x="6" y="130" width="118" height="38" fill="#2b2620" rx="4" />
        <rect x="6" y="130" width="118" height="6" fill="#1a1612" rx="2" />
        <text x="65" y="153" text-anchor="middle" font-family="Georgia, serif"
              font-size="10" font-weight="700" fill="#d4b27a" letter-spacing="2">DAILY YOU</text>
        <text x="65" y="164" text-anchor="middle" font-family="Georgia, serif"
              font-size="6" fill="#8a7860" letter-spacing="1">BREAKING NEWS</text>

        <!-- 身體（小一點） -->
        <g class="anchor-body">
          <!-- 西裝（圓肩） -->
          <path d="M 38 130 Q 40 116 50 112 L 80 112 Q 90 116 92 130 L 92 138 L 38 138 Z" fill="#3a3a4a" />
          <!-- 領片 -->
          <polygon points="50,112 65,128 80,112 75,112 65,122 55,112" fill="#f0ebe0" />
          <!-- 領結 -->
          <polygon points="58,118 62,116 62,122 58,122" fill="#ff6b6b" />
          <polygon points="62,116 66,118 66,122 62,122" fill="#ff6b6b" />
          <circle cx="62" cy="119" r="1.2" fill="#c54040" />
        </g>

        <!-- 大頭 -->
        <g class="anchor-head">
          <!-- 頸 -->
          <rect x="60" y="104" width="10" height="10" fill="#f7d5b0" />
          <!-- 圓臉 -->
          <circle cx="65" cy="68" r="32" fill="#fce0c4" />
          <!-- 頭髮（蓬鬆瀏海） -->
          <path d="M 33 64 Q 33 30 65 30 Q 97 30 97 64
                   Q 95 48 86 44 Q 78 52 70 48 Q 60 52 50 48 Q 36 48 33 64 Z"
                fill="#4a2e22" />
          <!-- 瀏海撮一搓 -->
          <path d="M 50 38 Q 55 50 62 42" fill="none" stroke="#4a2e22" stroke-width="3" stroke-linecap="round" />

          <!-- 腮紅 -->
          <ellipse cx="44" cy="78" rx="7" ry="4" fill="#ff9eab" opacity="0.55" />
          <ellipse cx="86" cy="78" rx="7" ry="4" fill="#ff9eab" opacity="0.55" />

          <!-- 大眼睛 -->
          <g class="anchor-eyes">
            <ellipse cx="52" cy="68" rx="6" ry="7.5" fill="#1a1612" />
            <ellipse cx="78" cy="68" rx="6" ry="7.5" fill="#1a1612" />
            <!-- 大高光 -->
            <ellipse cx="54" cy="65" rx="2.4" ry="2.8" fill="#fff" />
            <ellipse cx="80" cy="65" rx="2.4" ry="2.8" fill="#fff" />
            <!-- 小高光 -->
            <circle cx="50" cy="72" r="1" fill="#fff" opacity="0.7" />
            <circle cx="76" cy="72" r="1" fill="#fff" opacity="0.7" />
          </g>

          <!-- 微笑 -->
          <path class="anchor-mouth"
                d="M 57 84 Q 65 90 73 84"
                fill="none" stroke="#7a2f1c" stroke-width="2.4" stroke-linecap="round" />

          <!-- 耳朵 -->
          <ellipse cx="33" cy="68" rx="3.2" ry="5" fill="#f7d5b0" />
          <ellipse cx="97" cy="68" rx="3.2" ry="5" fill="#f7d5b0" />
        </g>

        <!-- 麥克風 -->
        <g class="anchor-mic">
          <ellipse cx="65" cy="118" rx="7" ry="6" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="1" />
          <line x1="60" y1="118" x2="70" y2="118" stroke="#0a0a0a" stroke-width="0.6" />
          <line x1="60" y1="115" x2="70" y2="115" stroke="#0a0a0a" stroke-width="0.6" />
          <line x1="60" y1="121" x2="70" y2="121" stroke="#0a0a0a" stroke-width="0.6" />
          <rect x="63" y="124" width="4" height="10" fill="#3a3a3a" />
          <!-- 脈動光環 -->
          <circle cx="65" cy="118" r="7" fill="none" stroke="#ff3030" stroke-width="1.2" opacity="0.7">
            <animate attributeName="r" values="7;12;7" dur="1.4s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.7;0;0.7" dur="1.4s" repeatCount="indefinite" />
          </circle>
        </g>

        <!-- LIVE 燈 -->
        <g class="anchor-live">
          <circle cx="112" cy="22" r="5" fill="#ff3030" />
          <text x="112" y="37" text-anchor="middle" font-family="Georgia, serif"
                font-size="6" font-weight="700" fill="#ff3030" letter-spacing="1">LIVE</text>
        </g>
      </svg>
    </div>
  </section>

  <script src="/biasWords.js"></script>
  <script src="/favorites-store.js"></script>
  <script src="/drawer.js"></script>
  <script src="/favorites.js"></script>
</body>
</html>
