<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>新聞筆記</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="fav">
  <header class="topbar">
    <a class="back-link" href="/">
      <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M15.5 4l-8 8 8 8 1.5-1.5L10.5 12l6.5-6.5z"/></svg>
      <span>回首頁</span>
    </a>
    <div class="paper-search">
      <input id="paperSearch" type="search" placeholder="🔍 搜尋今日所有標題…" autocomplete="off" />
      <div id="paperSearchResults" class="paper-search-results" hidden></div>
    </div>
    <span id="status" class="status"></span>
  </header>

  <section class="newspaper" id="newspaper">
    <header class="masthead masthead-compact">
      <div class="masthead-rule"></div>
      <h1 class="masthead-title" id="paperTitleH1"
          contenteditable="true" spellcheck="false"
          title="點擊可編輯標題">新聞筆記</h1>
      <div class="masthead-bottom">
        <span id="paperDate"></span>
        <span class="dot-sep">·</span>
        <span id="paperCount">0 則</span>
      </div>
      <div class="masthead-rule"></div>
    </header>
    <div id="clippings" class="clippings"></div>

    <!-- 動態台灣黑熊 + 珍奶 -->
    <div class="anchor-bubble" id="anchorBubble" aria-hidden="true"></div>
    <div class="anchor-mascot" aria-hidden="true" title="台灣黑熊正在喝珍奶看新聞">
      <svg viewBox="0 0 140 175" xmlns="http://www.w3.org/2000/svg">
        <!-- 棚台 -->
        <rect x="6" y="135" width="128" height="38" fill="#2b2620" rx="4" />
        <rect x="6" y="135" width="128" height="6" fill="#1a1612" rx="2" />
        <text x="70" y="158" text-anchor="middle" font-family="Georgia, serif"
              font-size="10" font-weight="700" fill="#d4b27a" letter-spacing="2">DAILY YOU</text>
        <text x="70" y="169" text-anchor="middle" font-family="Georgia, serif"
              font-size="6" fill="#8a7860" letter-spacing="1">BREAKING NEWS · 黑熊播報</text>

        <!-- 黑熊身體 -->
        <g class="anchor-body">
          <ellipse cx="70" cy="115" rx="32" ry="26" fill="#1a1410" />
          <!-- 胸前白色 V (台灣黑熊招牌) -->
          <path d="M 53 108 L 70 128 L 87 108"
                fill="none" stroke="#fdf6e8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
          <!-- 熊掌（抓珍奶杯） -->
          <ellipse cx="86" cy="118" rx="6" ry="8" fill="#0d0907" />
          <ellipse cx="118" cy="118" rx="6" ry="8" fill="#0d0907" />
        </g>

        <!-- 黑熊頭 -->
        <g class="anchor-head">
          <!-- 圓耳 -->
          <circle cx="40" cy="38" r="11" fill="#1a1410" />
          <circle cx="100" cy="38" r="11" fill="#1a1410" />
          <circle cx="40" cy="38" r="5.5" fill="#4a2820" />
          <circle cx="100" cy="38" r="5.5" fill="#4a2820" />

          <!-- 圓頭 -->
          <circle cx="70" cy="65" r="33" fill="#1a1410" />

          <!-- 米色臉部 -->
          <ellipse cx="70" cy="78" rx="20" ry="15" fill="#d4a87a" />

          <!-- 眉毛（小撮） -->
          <ellipse cx="56" cy="55" rx="3" ry="1.2" fill="#0d0907" />
          <ellipse cx="84" cy="55" rx="3" ry="1.2" fill="#0d0907" />

          <!-- 眼睛 -->
          <g class="anchor-eyes">
            <circle cx="56" cy="62" r="4.5" fill="#fdf6e8" />
            <circle cx="84" cy="62" r="4.5" fill="#fdf6e8" />
            <circle cx="57" cy="63" r="2.8" fill="#0d0907" />
            <circle cx="85" cy="63" r="2.8" fill="#0d0907" />
            <circle cx="58" cy="61.5" r="1" fill="#fff" />
            <circle cx="86" cy="61.5" r="1" fill="#fff" />
          </g>

          <!-- 鼻 -->
          <ellipse cx="70" cy="74" rx="4" ry="3" fill="#0d0907" />

          <!-- 嘴（含吸管） -->
          <path class="anchor-mouth"
                d="M 64 84 Q 70 87 76 84"
                fill="none" stroke="#5a3020" stroke-width="2" stroke-linecap="round" />
        </g>

        <!-- 珍珠奶茶杯 -->
        <g class="boba-cup">
          <!-- 杯身 -->
          <path d="M 95 95 L 100 138 L 124 138 L 129 95 Z"
                fill="rgba(232,200,160,0.92)" stroke="#5a3020" stroke-width="1.5" />
          <!-- 奶茶上層 -->
          <path d="M 95 95 L 96 105 L 128 105 L 129 95 Z"
                fill="rgba(212,178,122,0.85)" />
          <!-- 杯緣 -->
          <ellipse cx="112" cy="95" rx="17" ry="3"
                   fill="#f4ecd8" stroke="#5a3020" stroke-width="1.5" />
          <!-- 珍珠（沉底） -->
          <circle cx="105" cy="128" r="2.5" fill="#0d0907" />
          <circle cx="112" cy="125" r="2.5" fill="#0d0907" />
          <circle cx="119" cy="128" r="2.5" fill="#0d0907" />
          <circle cx="108" cy="132" r="2.5" fill="#0d0907" />
          <circle cx="116" cy="132" r="2.5" fill="#0d0907" />
          <circle cx="101" cy="132" r="2.5" fill="#0d0907" />
          <circle cx="123" cy="130" r="2.5" fill="#0d0907" />
          <circle cx="112" cy="135" r="2.5" fill="#0d0907" />
          <!-- 吸管（從杯口伸到熊嘴） -->
          <line x1="108" y1="88" x2="76" y2="84"
                stroke="#ff4d6d" stroke-width="3" stroke-linecap="round" />
          <line x1="108" y1="88" x2="76" y2="84"
                stroke="#fff" stroke-width="0.6" stroke-dasharray="2 2" />
        </g>

        <!-- LIVE 燈 -->
        <g class="anchor-live">
          <circle cx="122" cy="22" r="5" fill="#ff3030" />
          <text x="122" y="37" text-anchor="middle" font-family="Georgia, serif"
                font-size="6" font-weight="700" fill="#ff3030" letter-spacing="1">LIVE</text>
        </g>
      </svg>
    </div>
  </section>

  <script src="/biasWords.js"></script>
  <script src="/favorites-store.js"></script>
  <script src="/drawer.js"></script>
  <script src="/favorites.js"></script>
</body>
</html>
