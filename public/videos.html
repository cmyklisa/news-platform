<!doctype html>
<html lang="zh-Hant">
<head>

  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="videos">

    <div class="vid-meta" id="vidMeta"></div>
    <div class="vid-grid" id="vidGrid">
      <div class="empty">載入中…</div>
    </div>

  <script>
    window.VIDEO_SOURCE_NAMES = {
      gn_yt_news:    'YouTube · 新聞',
      gn_yt_taiwan:  'YouTube · 台灣',
      gn_yt_politic: 'YouTube · 政治',
